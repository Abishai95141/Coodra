name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: lint + typecheck + unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Print toolchain versions
        run: |
          node --version
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Approve build scripts
        # `pnpm install --frozen-lockfile` is lenient about unbuilt native deps,
        # but some workspaces (better-sqlite3, esbuild) need their postinstall
        # scripts run for typecheck / tests to work. `pnpm rebuild` re-runs
        # them against the already-resolved versions.
        run: pnpm rebuild

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit

  integration:
    name: postgres migrations (integration)
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 15
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: contextos
          POSTGRES_PASSWORD: contextos_ci_password
          POSTGRES_DB: contextos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U contextos -d contextos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://contextos:contextos_ci_password@127.0.0.1:5432/contextos
      REDIS_URL: redis://127.0.0.1:6379/0
      CONTEXTOS_MODE: team
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Approve build scripts
        run: pnpm rebuild

      - name: Build @contextos/shared (required by @contextos/db imports)
        run: pnpm --filter @contextos/shared build

      - name: Integration tests (Postgres migrations)
        run: pnpm test:integration
